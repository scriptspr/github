<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StockCounter Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d12;
            --surface: #111318;
            --surface2: #181b22;
            --border: #1f2330;
            --border-hi: #2d3348;
            --text: #e2e5f0;
            --text-muted: #5a6178;
            --text-dim: #8892aa;
            --accent: #f4a700;
            --accent-dim: rgba(244,167,0,0.12);
            --accent-glow: rgba(244,167,0,0.25);
            --red: #e03e3e;
            --green: #22c77a;
            --blue: #3b82f6;
            --cyan: #06b6d4;
            --mono: 'DM Mono', monospace;
            --display: 'Syne', sans-serif;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: var(--display);
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Subtle grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        .app-header {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 34px;
            height: 34px;
            background: var(--accent);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .logo-text {
            font-family: var(--display);
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo-text span {
            color: var(--accent);
        }

        .header-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .total-badge {
            display: flex;
            align-items: baseline;
            gap: 8px;
            background: var(--accent-dim);
            border: 1px solid var(--accent-glow);
            padding: 6px 18px;
            border-radius: 6px;
        }

        .total-label {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .total-value {
            font-family: var(--mono);
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--accent);
            line-height: 1;
            min-width: 3ch;
            text-align: center;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ── BUTTONS ── */
        .btn {
            font-family: var(--display);
            font-weight: 600;
            font-size: 0.72rem;
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.15s;
            touch-action: manipulation;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .btn:active { transform: scale(0.95); }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #ffc107; }

        .btn-danger { background: #3a1515; color: var(--red); border: 1px solid #5a2020; }
        .btn-danger:hover { background: #4a1818; }

        .btn-success { background: #0d2e1f; color: var(--green); border: 1px solid #155033; }
        .btn-success:hover { background: #10381f; }

        .btn-ghost { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); }

        .btn-cyan { background: #072029; color: var(--cyan); border: 1px solid #0a3040; }
        .btn-cyan:hover { background: #0a2535; }

        .btn-active-mode {
            background: var(--accent) !important;
            color: #000 !important;
            border-color: transparent !important;
        }

        .btn-icon {
            padding: 7px 10px;
            font-size: 0.9rem;
        }

        /* ── MAIN LAYOUT ── */
        .app-body {
            position: relative;
            z-index: 1;
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            height: calc(100vh - 63px);
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-section {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        .section-label {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* File upload */
        .file-upload-area {
            border: 1.5px dashed var(--border-hi);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .file-upload-area:hover {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .file-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .upload-text { font-family: var(--mono); font-size: 0.65rem; color: var(--text-dim); }

        /* Brush controls */
        .brush-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brush-label {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            min-width: 28px;
        }

        input[type="range"] {
            flex: 1;
            -webkit-appearance: none;
            height: 3px;
            background: var(--border-hi);
            border-radius: 10px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }

        .brush-val {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
            min-width: 28px;
            text-align: right;
        }

        input[type="color"] {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid var(--border-hi);
            cursor: pointer;
            padding: 0;
            background: none;
            flex-shrink: 0;
        }

        /* Mode selector */
        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .mode-btn {
            font-family: var(--display);
            font-weight: 600;
            font-size: 0.7rem;
            padding: 9px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.15s;
            background: var(--surface2);
            color: var(--text-dim);
            touch-action: manipulation;
        }

        .mode-btn:hover { border-color: var(--border-hi); color: var(--text); }
        .mode-btn.active { background: var(--accent); color: #000; border-color: transparent; }

        /* Materials list */
        .materials-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-hi) transparent;
        }

        .material-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 7px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 5px;
        }

        .material-row:hover { background: var(--surface2); border-color: var(--border); }
        .material-row.selected { background: var(--accent-dim); border-color: var(--accent-glow); }

        .mat-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
            cursor: pointer;
        }

        .mat-name {
            flex: 1;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            text-transform: capitalize;
        }

        .mat-count {
            font-family: var(--mono);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--accent);
            min-width: 2.5ch;
            text-align: right;
        }

        .mat-actions {
            display: flex;
            gap: 3px;
        }

        .mat-btn {
            width: 22px;
            height: 22px;
            font-size: 0.6rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: all 0.1s;
            touch-action: manipulation;
        }

        .mat-btn:active { transform: scale(0.9); }
        .mat-btn-inc { background: #0d2e1f; color: var(--green); }
        .mat-btn-dec { background: #2a1a0a; color: #f59e0b; }
        .mat-btn-rst { background: var(--surface2); color: var(--text-muted); }
        .mat-btn-del { background: #2a1010; color: var(--red); }

        /* Add material */
        .add-mat-form {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-text {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 7px 12px;
            border-radius: 6px;
            font-family: var(--display);
            font-size: 0.75rem;
            flex: 1;
            min-width: 100px;
            outline: none;
            transition: border-color 0.15s;
        }

        .input-text:focus { border-color: var(--accent); }
        .input-text::placeholder { color: var(--text-muted); }

        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* ── CANVAS AREA ── */
        .canvas-area {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .canvas-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .canvas-wrap {
            flex: 1;
            overflow: auto;
            display: grid;
            place-items: center;
            padding: 16px;
            position: relative;
        }

        canvas {
            max-width: 100%;
            height: auto;
            cursor: crosshair;
            border-radius: 8px;
            display: block;
            box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.5);
        }

        .canvas-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-muted);
            font-family: var(--mono);
            font-size: 0.75rem;
        }

        .canvas-placeholder svg {
            opacity: 0.2;
        }

        /* ── STATUS BAR ── */
        .status-bar {
            padding: 7px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .status-text {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .status-shortcuts {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        kbd {
            background: var(--surface2);
            border: 1px solid var(--border-hi);
            padding: 1px 5px;
            border-radius: 3px;
            font-family: var(--mono);
            font-size: 0.58rem;
        }

        /* ── LENS ── */
        .lens-container {
            position: fixed;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 1000;
            display: none;
            overflow: hidden;
            box-shadow: 0 0 0 1px var(--border), 0 8px 32px rgba(0,0,0,0.8);
        }

        /* ── SAVE TOAST ── */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--green);
            color: #000;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
            z-index: 2000;
            font-family: var(--mono);
            letter-spacing: 1px;
        }

        .badge-tag {
            font-family: var(--mono);
            font-size: 0.5rem;
            padding: 1px 5px;
            border-radius: 3px;
            background: var(--border-hi);
            color: var(--text-muted);
        }

        /* ── MOBILE ── */
        @media (max-width: 720px) {
            .app-body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                height: auto;
                overflow: auto;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .materials-scroll {
                max-height: 220px;
            }

            .canvas-area {
                height: 60vh;
            }

            .logo-text, .total-badge .total-label { display: none; }
        }

        @media (max-width: 420px) {
            .app-header { padding: 10px 12px; }
            .sidebar-section, .materials-scroll, .sidebar-footer { padding-left: 10px; padding-right: 10px; }
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 10px; }

        /* ── FOOTER ── */
        .app-footer {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 8px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .footer-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .footer-text {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        .footer-name {
            font-family: var(--display);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        .footer-sep {
            color: var(--border-hi);
            font-family: var(--mono);
            font-size: 0.6rem;
        }
    </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="app-header">
    <div class="logo-area">
        <div class="logo-icon">📦</div>
        <div class="logo-text">Stock<span>Counter</span> Pro</div>
    </div>

    <div class="header-center">
        <div class="total-badge">
            <span class="total-label">Total</span>
            <span class="total-value" id="totalCount">0</span>
        </div>
    </div>

    <div class="header-actions">
        <button class="btn btn-ghost btn-icon" id="undoBtn" title="Deshacer (Ctrl+Z)">↩</button>
        <button class="btn btn-danger btn-icon" id="resetCountBtn" title="Reiniciar todo">🗑</button>
        <button class="btn btn-success" id="saveImageBtn">💾 Imagen</button>
        <button class="btn btn-cyan" id="exportBtn">📄 Informe</button>
        <button class="btn btn-ghost btn-icon" id="themeToggle" title="Tema">🌓</button>
    </div>
</header>

<!-- ── BODY ── -->
<div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- Upload -->
        <div class="sidebar-section">
            <div class="section-label">Imagen</div>
            <div class="file-upload-area">
                <input type="file" id="imageUpload" accept="image/jpeg,image/jpg,image/png">
                <span class="upload-icon">🖼</span>
                <span class="upload-text">Toca para cargar imagen</span>
            </div>
        </div>

        <!-- Brush -->
        <div class="sidebar-section">
            <div class="section-label">Pincel</div>
            <div class="brush-row" style="margin-bottom:8px;">
                <span class="brush-label">Tam.</span>
                <input type="range" id="brushSize" min="3" max="28" value="12">
                <span class="brush-val" id="sizeValue">12px</span>
                <input type="color" id="brushColor" value="#ef4444">
            </div>
        </div>

        <!-- Mode -->
        <div class="sidebar-section">
            <div class="section-label">Modo</div>
            <div class="mode-grid">
                <button class="mode-btn active" id="modePointBtn">✏️ Punto</button>
                <button class="mode-btn" id="modeDragBtn">🖱 Arrastre</button>
                <button class="mode-btn" id="modeAreaBtn">📐 Área</button>
                <button class="mode-btn" id="modeLensBtn">🔍 Lupa</button>
            </div>
            <button class="btn btn-danger" id="disableLensBtn" style="display:none; width:100%; margin-top:6px; justify-content:center;">❌ Desactivar Lupa</button>
        </div>

        <!-- Materials -->
        <div class="section-label" style="padding: 10px 14px 0; margin-bottom:0;">
            Materiales
            <div style="display:flex;gap:5px;margin-left:auto;">
                <button class="btn btn-ghost" id="resetCustomMaterialsBtn" style="padding:3px 8px;font-size:0.6rem;">🗑 Custom</button>
                <button class="btn btn-danger" id="resetAllMaterialsBtn" style="padding:3px 8px;font-size:0.6rem;">⟳ Default</button>
            </div>
        </div>
        <div class="materials-scroll" id="materialList"></div>

        <!-- Add -->
        <div class="sidebar-section">
            <div class="section-label">Agregar material</div>
            <div class="add-mat-form">
                <input type="text" class="input-text" id="newMaterialName" placeholder="ej: pernos, vigas…" maxlength="25">
                <input type="color" id="newMaterialColor" value="#3b82f6">
                <button class="btn btn-success btn-icon" id="addMaterialBtn">＋</button>
            </div>
        </div>

        <div class="sidebar-footer">
            <button class="btn btn-ghost" id="backupMaterialsBtn" style="flex:1;justify-content:center;">💾 Exportar lista</button>
            <button class="btn btn-ghost" id="restoreMaterialsBtn" style="flex:1;justify-content:center;">📂 Importar</button>
        </div>
    </aside>

    <!-- CANVAS AREA -->
    <main class="canvas-area">
        <div class="canvas-toolbar">
            <span id="modeStatus" style="font-family:var(--mono);font-size:0.68rem;color:var(--text-dim);flex:1;">
                ✅ StockCounter Pro listo
            </span>
        </div>

        <div class="canvas-wrap" id="canvasWrap">
            <div class="canvas-placeholder" id="canvasPlaceholder">
                <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                    <path d="M3 9h18M9 21V9"/>
                </svg>
                <span>Carga una imagen para comenzar</span>
            </div>
            <canvas id="materialCanvas" style="display:none;"></canvas>
        </div>

        <div class="status-bar">
            <span class="status-text" id="statusInfo">Sin imagen cargada</span>
            <span class="status-shortcuts">
                <kbd>Ctrl+Z</kbd> Deshacer &nbsp; <kbd>Esc</kbd> Cerrar lupa
            </span>
        </div>
    </main>
</div>

<!-- ── FOOTER ── -->
<footer class="app-footer">
    <div class="footer-dot"></div>
    <span class="footer-text">Desarrollado por</span>
    <span class="footer-name">Landy Cruz</span>
    <span class="footer-sep">·</span>
    <span class="footer-text">Propietario &amp; Desarrollador</span>
    <div class="footer-dot"></div>
</footer>

<!-- LENS -->
<div id="lens" class="lens-container">
    <canvas id="lensCanvas"></canvas>
</div>
<div id="saveIndicator" class="toast">✓ GUARDADO</div>

<script>
    // DOM
    const canvas = document.getElementById('materialCanvas');
    const ctx = canvas.getContext('2d');
    const imageUpload = document.getElementById('imageUpload');
    const totalCountSpan = document.getElementById('totalCount');
    const undoBtn = document.getElementById('undoBtn');
    const resetCountBtn = document.getElementById('resetCountBtn');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const exportBtn = document.getElementById('exportBtn');
    const themeToggle = document.getElementById('themeToggle');
    const brushSizeInput = document.getElementById('brushSize');
    const brushColorInput = document.getElementById('brushColor');
    const sizeValue = document.getElementById('sizeValue');
    const materialListDiv = document.getElementById('materialList');
    const newMaterialName = document.getElementById('newMaterialName');
    const newMaterialColor = document.getElementById('newMaterialColor');
    const addMaterialBtn = document.getElementById('addMaterialBtn');
    const modeStatus = document.getElementById('modeStatus');
    const statusInfo = document.getElementById('statusInfo');
    const resetAllMaterialsBtn = document.getElementById('resetAllMaterialsBtn');
    const resetCustomMaterialsBtn = document.getElementById('resetCustomMaterialsBtn');
    const backupMaterialsBtn = document.getElementById('backupMaterialsBtn');
    const restoreMaterialsBtn = document.getElementById('restoreMaterialsBtn');
    const saveIndicator = document.getElementById('saveIndicator');
    const disableLensBtn = document.getElementById('disableLensBtn');
    const canvasPlaceholder = document.getElementById('canvasPlaceholder');
    const modePointBtn = document.getElementById('modePointBtn');
    const modeDragBtn = document.getElementById('modeDragBtn');
    const modeAreaBtn = document.getElementById('modeAreaBtn');
    const modeLensBtn = document.getElementById('modeLensBtn');
    const lens = document.getElementById('lens');
    const lensCanvas = document.getElementById('lensCanvas');
    const lensCtx = lensCanvas.getContext('2d');

    let lensActive = false;
    let lensMoveHandlerRef = null;
    let img = new Image();
    let marks = [];
    let currentScale = 1;
    let canvasNaturalWidth = 0, canvasNaturalHeight = 0;
    let currentBrushSize = 12;
    let currentBrushColor = "#ef4444";
    let materials = {};
    let currentMaterial = "";
    const defaultMaterials = ["tubos", "planchas", "varillas"];
    let currentMode = "point";
    let isDragging = false;
    let lastDragPoint = null;
    let dragDistance = 12;
    let isSelectingArea = false;
    let areaStart = null, areaEnd = null;

    function showSaveIndicatorMsg() {
        saveIndicator.style.opacity = "1";
        setTimeout(() => { saveIndicator.style.opacity = "0"; }, 1200);
    }

    function saveToStorage() {
        const d = { materials, currentMaterial, version: "3.0" };
        localStorage.setItem('contador_materiales_pro', JSON.stringify(d));
        showSaveIndicatorMsg();
    }

    function loadFromStorage() {
        const saved = localStorage.getItem('contador_materiales_pro');
        if (saved) {
            try {
                const d = JSON.parse(saved);
                if (d.materials) materials = d.materials;
                if (d.currentMaterial && materials[d.currentMaterial]) currentMaterial = d.currentMaterial;
            } catch(e) { console.error(e); }
        }
        if (Object.keys(materials).length === 0) {
            materials = {
                tubos:    { count: 0, color: "#ef4444" },
                planchas: { count: 0, color: "#22c77a" },
                varillas: { count: 0, color: "#facc15" }
            };
            currentMaterial = "tubos";
            saveToStorage();
        }
        if (!materials[currentMaterial]) currentMaterial = Object.keys(materials)[0];
        renderMaterialList();
        updateTotalUI();
        updateBrushFromMaterial();
    }

    function updateBrushFromMaterial() {
        if (materials[currentMaterial]) {
            currentBrushColor = materials[currentMaterial].color;
            brushColorInput.value = currentBrushColor;
        }
    }

    function updateTotalUI() {
        let total = 0;
        for (let m in materials) total += materials[m].count;
        totalCountSpan.innerText = total;
    }

    function renderMaterialList() {
        materialListDiv.innerHTML = '';
        for (let material in materials) {
            const mData = materials[material];
            const isDefault = defaultMaterials.includes(material);
            const row = document.createElement('div');
            row.className = 'material-row' + (currentMaterial === material ? ' selected' : '');
            row.setAttribute('data-material', material);

            row.innerHTML = `
                <div class="mat-dot" style="background:${mData.color};" data-colormaterial="${material}"></div>
                <span class="mat-name">${material}</span>
                ${isDefault ? '<span class="badge-tag">def</span>' : '<span class="badge-tag">custom</span>'}
                <span class="mat-count" id="count_${material}">${mData.count}</span>
                <div class="mat-actions">
                    <button class="mat-btn mat-btn-inc" data-material="${material}" title="+1">+</button>
                    <button class="mat-btn mat-btn-dec" data-material="${material}" title="-1">−</button>
                    <button class="mat-btn mat-btn-rst" data-material="${material}" title="Reiniciar">⟳</button>
                    <button class="mat-btn mat-btn-del" data-material="${material}" title="Eliminar">✕</button>
                </div>
            `;
            materialListDiv.appendChild(row);
        }

        // Color dot click
        document.querySelectorAll('.mat-dot').forEach(el => {
            el.addEventListener('click', e => {
                e.stopPropagation();
                const m = el.getAttribute('data-colormaterial');
                const newColor = prompt("Color hex:", materials[m].color);
                if (newColor && /^#[0-9A-Fa-f]{6}$/.test(newColor)) {
                    materials[m].color = newColor;
                    if (currentMaterial === m) currentBrushColor = newColor;
                    saveToStorage(); renderMaterialList(); redrawCanvas();
                }
            });
        });

        // Row click = select
        document.querySelectorAll('.material-row').forEach(row => {
            row.addEventListener('click', e => {
                if (e.target.closest('.mat-actions') || e.target.classList.contains('mat-dot')) return;
                currentMaterial = row.getAttribute('data-material');
                updateBrushFromMaterial();
                renderMaterialList();
                modeStatus.innerText = `📌 Material activo: ${currentMaterial}`;
            });
        });

        // +1
        document.querySelectorAll('.mat-btn-inc').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const m = btn.getAttribute('data-material');
                currentMaterial = m;
                updateBrushFromMaterial();
                renderMaterialList();
                modeStatus.innerText = `📌 Material activo: ${currentMaterial}`;
            });
        });

        // -1
        document.querySelectorAll('.mat-btn-dec').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const m = btn.getAttribute('data-material');
                for (let i = marks.length - 1; i >= 0; i--) {
                    if (marks[i].material === m) { marks.splice(i, 1); materials[m].count--; break; }
                }
                if (materials[m].count < 0) materials[m].count = 0;
                updateTotalUI(); saveToStorage(); renderMaterialList(); redrawCanvas();
            });
        });

        // reset
        document.querySelectorAll('.mat-btn-rst').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const m = btn.getAttribute('data-material');
                if (confirm(`Reiniciar "${m}"?`)) {
                    marks = marks.filter(mk => mk.material !== m);
                    materials[m].count = 0;
                    updateTotalUI(); saveToStorage(); renderMaterialList(); redrawCanvas();
                }
            });
        });

        // delete
        document.querySelectorAll('.mat-btn-del').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const m = btn.getAttribute('data-material');
                if (confirm(`Eliminar "${m}"? Se perderán ${materials[m].count} marcas`)) {
                    marks = marks.filter(mk => mk.material !== m);
                    delete materials[m];
                    if (currentMaterial === m) currentMaterial = Object.keys(materials)[0] || '';
                    if (Object.keys(materials).length === 0) {
                        materials = { material_base: { count:0, color:"#3b82f6" } };
                        currentMaterial = "material_base";
                    }
                    saveToStorage(); renderMaterialList(); updateTotalUI(); redrawCanvas();
                }
            });
        });
    }

    function resetAllCounters() {
        if (confirm("Reiniciar todos los contadores?")) {
            marks = [];
            for (let m in materials) materials[m].count = 0;
            updateTotalUI(); saveToStorage(); renderMaterialList(); redrawCanvas();
            modeStatus.innerText = "🧹 Contadores reiniciados";
        }
    }

    function resetToDefaultMaterialsOnly() {
        if (confirm("Restablecer materiales por defecto?")) {
            materials = {
                tubos:    { count: 0, color: "#ef4444" },
                planchas: { count: 0, color: "#22c77a" },
                varillas: { count: 0, color: "#facc15" }
            };
            marks = []; currentMaterial = "tubos"; currentBrushColor = materials.tubos.color;
            saveToStorage(); renderMaterialList(); updateTotalUI(); redrawCanvas();
            modeStatus.innerText = "✅ Materiales por defecto restaurados";
        }
    }

    function resetCustomMaterialsOnly() {
        const custom = Object.keys(materials).filter(m => !defaultMaterials.includes(m));
        if (custom.length === 0) { modeStatus.innerText = "ℹ️ No hay materiales personalizados"; return; }
        if (confirm(`Eliminar ${custom.length} materiales personalizados?`)) {
            marks = marks.filter(m => defaultMaterials.includes(m.material));
            const newMat = {};
            defaultMaterials.forEach(d => {
                newMat[d] = materials[d] ? { count:0, color:materials[d].color } :
                    { count:0, color: d==="tubos"?"#ef4444": d==="planchas"?"#22c77a":"#facc15" };
            });
            materials = newMat;
            if (!defaultMaterials.includes(currentMaterial)) currentMaterial = "tubos";
            saveToStorage(); renderMaterialList(); updateTotalUI(); redrawCanvas();
            modeStatus.innerText = "🗑 Personalizados eliminados";
        }
    }

    function addNewMaterial() {
        const name = newMaterialName.value.trim();
        if (!name) { alert("Nombre requerido"); return; }
        if (materials[name]) { alert("Ya existe"); return; }
        materials[name] = { count: 0, color: newMaterialColor.value };
        currentMaterial = name;
        saveToStorage(); renderMaterialList(); updateTotalUI();
        newMaterialName.value = '';
        modeStatus.innerText = `✅ Material "${name}" agregado`;
    }

    function backupMaterials() {
        const d = { materials, version: "3.0", date: new Date().toISOString() };
        const blob = new Blob([JSON.stringify(d, null, 2)], { type:"application/json" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `materiales_${Date.now()}.json`; a.click();
        URL.revokeObjectURL(a.href);
    }

    function restoreMaterials() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'application/json';
        input.onchange = e => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if (d.materials) {
                        materials = d.materials; marks = [];
                        for (let m in materials) materials[m].count = 0;
                        currentMaterial = Object.keys(materials)[0];
                        saveToStorage(); renderMaterialList(); updateTotalUI(); redrawCanvas();
                        modeStatus.innerText = "📂 Lista importada";
                    } else alert("Formato inválido");
                } catch(err) { alert("Error al leer"); }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function redrawCanvas() {
        if (!img.src || img.width === 0) return;
        canvasNaturalWidth = img.width;
        canvasNaturalHeight = img.height;
        const wrap = document.getElementById('canvasWrap');
        const maxW = wrap.clientWidth - 32;
        const maxH = wrap.clientHeight - 32;
        let scaleX = maxW / canvasNaturalWidth;
        let scaleY = maxH / canvasNaturalHeight;
        currentScale = Math.min(scaleX, scaleY, 1);
        if (currentScale < 0.1) currentScale = 0.1;
        canvas.width = canvasNaturalWidth * currentScale;
        canvas.height = canvasNaturalHeight * currentScale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        for (let mark of marks) {
            const sx = mark.x * currentScale, sy = mark.y * currentScale;
            const sz = (mark.size || 12) * currentScale;
            ctx.beginPath(); ctx.arc(sx, sy, sz * 0.55, 0, 2 * Math.PI);
            ctx.fillStyle = mark.color; ctx.fill();
            ctx.beginPath(); ctx.arc(sx, sy, sz * 0.22, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff"; ctx.fill();
        }
        if (currentMode === "area" && isSelectingArea && areaStart && areaEnd) {
            ctx.save();
            ctx.strokeStyle = "#f4a700"; ctx.setLineDash([6,6]); ctx.lineWidth = 2;
            ctx.strokeRect(areaStart.x, areaStart.y, areaEnd.x - areaStart.x, areaEnd.y - areaStart.y);
            ctx.fillStyle = "rgba(244,167,0,0.08)";
            ctx.fillRect(areaStart.x, areaStart.y, areaEnd.x - areaStart.x, areaEnd.y - areaStart.y);
            ctx.restore();
        }
        statusInfo.innerText = `${canvasNaturalWidth}×${canvasNaturalHeight}px · escala ${(currentScale * 100).toFixed(0)}%`;
    }

    function canvasToNatural(cx, cy) { return { x: cx / currentScale, y: cy / currentScale }; }

    function addMark(nx, ny) {
        marks.push({ x: nx, y: ny, size: currentBrushSize, color: currentBrushColor, material: currentMaterial });
        materials[currentMaterial].count++;
        updateTotalUI(); saveToStorage(); redrawCanvas();
        const cnt = document.getElementById('count_' + currentMaterial);
        if (cnt) cnt.innerText = materials[currentMaterial].count;
    }

    function countArea(s, e) {
        const left = Math.min(s.x, e.x), right = Math.max(s.x, e.x);
        const top = Math.min(s.y, e.y), bottom = Math.max(s.y, e.y);
        const step = Math.max(currentBrushSize * 1.6, 18);
        let added = 0;
        for (let x = left; x <= right; x += step)
            for (let y = top; y <= bottom; y += step) {
                marks.push({ x, y, size: currentBrushSize, color: currentBrushColor, material: currentMaterial });
                materials[currentMaterial].count++; added++;
            }
        updateTotalUI(); saveToStorage(); redrawCanvas();
        modeStatus.innerText = `📐 Área: +${added} piezas en "${currentMaterial}"`;
        setTimeout(() => { if (currentMode === "area") modeStatus.innerText = "📐 Modo Área — arrastra para seleccionar"; }, 2000);
    }

    function getCanvasCoords(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleXC = canvas.width / rect.width, scaleYC = canvas.height / rect.height;
        let clientX, clientY;
        if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
        else { clientX = e.clientX; clientY = e.clientY; }
        let cx = (clientX - rect.left) * scaleXC;
        let cy = (clientY - rect.top) * scaleYC;
        cx = Math.min(Math.max(0, cx), canvas.width);
        cy = Math.min(Math.max(0, cy), canvas.height);
        return { canvasX: cx, canvasY: cy };
    }

    function onCanvasStart(e) {
        e.preventDefault();
        if (!img.src || img.width === 0) return;
        const { canvasX, canvasY } = getCanvasCoords(e);
        const nat = canvasToNatural(canvasX, canvasY);
        if (currentMode === "point") {
            addMark(nat.x, nat.y);
            modeStatus.innerText = `✏️ ${currentMaterial}: ${materials[currentMaterial].count}`;
        } else if (currentMode === "drag") {
            isDragging = true; lastDragPoint = { x: nat.x, y: nat.y }; addMark(nat.x, nat.y);
        } else if (currentMode === "area") {
            isSelectingArea = true; areaStart = { x: canvasX, y: canvasY }; areaEnd = { x: canvasX, y: canvasY };
        } else if (currentMode === "lens") {
            addMark(nat.x, nat.y);
            modeStatus.innerText = `🔍 ${currentMaterial}: ${materials[currentMaterial].count}`;
        }
    }

    function onCanvasMove(e) {
        if (!img.src || img.width === 0) return;
        const { canvasX, canvasY } = getCanvasCoords(e);
        const nat = canvasToNatural(canvasX, canvasY);
        if (currentMode === "drag" && isDragging && lastDragPoint) {
            const dist = Math.hypot(nat.x - lastDragPoint.x, nat.y - lastDragPoint.y);
            if (dist >= dragDistance) { addMark(nat.x, nat.y); lastDragPoint = { x: nat.x, y: nat.y }; }
        } else if (currentMode === "area" && isSelectingArea && areaStart) {
            areaEnd = { x: canvasX, y: canvasY }; redrawCanvas();
        }
    }

    function onCanvasEnd(e) {
        if (currentMode === "drag") { isDragging = false; lastDragPoint = null; }
        else if (currentMode === "area" && isSelectingArea && areaStart && areaEnd) {
            const sNat = canvasToNatural(areaStart.x, areaStart.y);
            const eNat = canvasToNatural(areaEnd.x, areaEnd.y);
            countArea(sNat, eNat);
            isSelectingArea = false; areaStart = areaEnd = null; redrawCanvas();
        }
        isSelectingArea = false;
    }

    function setMode(mode) {
        if (lensActive) disableLens();
        currentMode = mode;
        isDragging = false; isSelectingArea = false;
        [modePointBtn, modeDragBtn, modeAreaBtn, modeLensBtn].forEach(b => b.classList.remove('active'));
        if (mode === "point") { modePointBtn.classList.add('active'); modeStatus.innerText = "✏️ Modo Punto — toca cada pieza"; }
        else if (mode === "drag") { modeDragBtn.classList.add('active'); modeStatus.innerText = "🖱 Modo Arrastre — desliza sobre las piezas"; }
        else if (mode === "area") { modeAreaBtn.classList.add('active'); modeStatus.innerText = "📐 Modo Área — arrastra para seleccionar región"; }
        else if (mode === "lens") { modeLensBtn.classList.add('active'); enableLens(); }
        redrawCanvas();
    }

    function enableLens() {
        if (!img.src || img.width === 0) { setMode("point"); return; }
        if (lensMoveHandlerRef) canvas.removeEventListener('mousemove', lensMoveHandlerRef);
        lensActive = true;
        disableLensBtn.style.display = "flex";
        lensMoveHandlerRef = (e) => {
            if (!lensActive) return;
            const rect = canvas.getBoundingClientRect();
            const sX = canvas.width / rect.width, sY = canvas.height / rect.height;
            let mx = (e.clientX - rect.left) * sX, my = (e.clientY - rect.top) * sY;
            if (mx >= 0 && mx <= canvas.width && my >= 0 && my <= canvas.height) {
                const nat = canvasToNatural(mx, my);
                lens.style.display = "block"; lens.style.left = (e.clientX + 15) + "px"; lens.style.top = (e.clientY + 15) + "px";
                const lensSize = 160, zoom = 2.8;
                lensCanvas.width = lensSize; lensCanvas.height = lensSize;
                const regionSize = lensSize / zoom;
                const startX = nat.x - regionSize / 2, startY = nat.y - regionSize / 2;
                const tmp = document.createElement('canvas');
                tmp.width = regionSize; tmp.height = regionSize;
                const tCtx = tmp.getContext('2d');
                tCtx.drawImage(img, startX, startY, regionSize, regionSize, 0, 0, regionSize, regionSize);
                lensCtx.clearRect(0, 0, lensSize, lensSize);
                lensCtx.drawImage(tmp, 0, 0, regionSize, regionSize, 0, 0, lensSize, lensSize);
                for (let mark of marks) {
                    let dx = (mark.x - startX) * zoom, dy = (mark.y - startY) * zoom;
                    if (dx >= 0 && dx <= lensSize && dy >= 0 && dy <= lensSize) {
                        lensCtx.beginPath(); lensCtx.arc(dx, dy, (mark.size || 12) * zoom * 0.5, 0, 2 * Math.PI);
                        lensCtx.fillStyle = mark.color; lensCtx.fill();
                    }
                }
            } else lens.style.display = "none";
        };
        canvas.addEventListener('mousemove', lensMoveHandlerRef);
    }

    function disableLens() {
        if (lensActive) {
            canvas.removeEventListener('mousemove', lensMoveHandlerRef);
            lens.style.display = "none"; lensActive = false; disableLensBtn.style.display = "none";
            if (currentMode === "lens") setMode("point");
            modeStatus.innerText = "🔍 Lupa desactivada";
        }
    }

    function undoLastMark() {
        if (marks.length === 0) return;
        const last = marks.pop();
        if (last.material && materials[last.material]) materials[last.material].count--;
        updateTotalUI(); saveToStorage(); renderMaterialList(); redrawCanvas();
    }

    function saveImageWithMarks() {
        if (!img.src) { alert("Carga una imagen primero"); return; }
        const tmp = document.createElement('canvas');
        tmp.width = canvasNaturalWidth; tmp.height = canvasNaturalHeight;
        const tCtx = tmp.getContext('2d');
        tCtx.drawImage(img, 0, 0);
        for (let mark of marks) {
            tCtx.beginPath(); tCtx.arc(mark.x, mark.y, (mark.size || 12) * 0.55, 0, 2 * Math.PI);
            tCtx.fillStyle = mark.color; tCtx.fill();
        }
        const a = document.createElement('a');
        a.download = `conteo_${Date.now()}.png`; a.href = tmp.toDataURL(); a.click();
    }

    function exportReport() {
        let report = `INFORME STOCKCOUNTER PRO\nFecha: ${new Date().toLocaleString()}\nTotal: ${totalCountSpan.innerText}\n\n`;
        for (let m in materials) if (materials[m].count > 0) report += `${m}: ${materials[m].count} piezas\n`;
        const blob = new Blob([report], { type: "text/plain" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob); a.download = `reporte_${Date.now()}.txt`; a.click();
        URL.revokeObjectURL(a.href);
    }

    function loadImage(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            img.onload = () => {
                marks = []; for (let m in materials) materials[m].count = 0;
                canvas.style.display = 'block'; canvasPlaceholder.style.display = 'none';
                updateTotalUI(); saveToStorage(); renderMaterialList(); redrawCanvas();
                modeStatus.innerText = `🖼 Imagen cargada (${img.width}×${img.height})`;
                if (currentMode === "lens") disableLens();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // Events
    brushSizeInput.addEventListener('input', e => { currentBrushSize = parseInt(e.target.value); sizeValue.innerText = currentBrushSize + "px"; });
    brushColorInput.addEventListener('input', e => { currentBrushColor = e.target.value; if (materials[currentMaterial]) materials[currentMaterial].color = currentBrushColor; saveToStorage(); renderMaterialList(); });
    undoBtn.addEventListener('click', undoLastMark);
    resetCountBtn.addEventListener('click', resetAllCounters);
    saveImageBtn.addEventListener('click', saveImageWithMarks);
    exportBtn.addEventListener('click', exportReport);
    themeToggle.addEventListener('click', () => {});
    addMaterialBtn.addEventListener('click', addNewMaterial);
    resetAllMaterialsBtn.addEventListener('click', resetToDefaultMaterialsOnly);
    resetCustomMaterialsBtn.addEventListener('click', resetCustomMaterialsOnly);
    backupMaterialsBtn.addEventListener('click', backupMaterials);
    restoreMaterialsBtn.addEventListener('click', restoreMaterials);
    disableLensBtn.addEventListener('click', disableLens);
    modePointBtn.addEventListener('click', () => setMode('point'));
    modeDragBtn.addEventListener('click', () => setMode('drag'));
    modeAreaBtn.addEventListener('click', () => setMode('area'));
    modeLensBtn.addEventListener('click', () => setMode('lens'));
    imageUpload.addEventListener('change', e => loadImage(e.target.files[0]));
    newMaterialName.addEventListener('keydown', e => { if (e.key === 'Enter') addNewMaterial(); });
    canvas.addEventListener('touchstart', onCanvasStart, { passive: false });
    canvas.addEventListener('touchmove', onCanvasMove, { passive: false });
    canvas.addEventListener('touchend', onCanvasEnd);
    canvas.addEventListener('mousedown', onCanvasStart);
    canvas.addEventListener('mousemove', onCanvasMove);
    canvas.addEventListener('mouseup', onCanvasEnd);
    window.addEventListener('resize', () => { if (img.src && img.width) redrawCanvas(); });
    window.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoLastMark(); }
        if (e.key === 'Escape') disableLens();
    });

    loadFromStorage();
    setMode('point');
</script>
</body>
</html>
