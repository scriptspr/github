<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi PC en Línea - Página de Prueba</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        h1 span {
            background: #ffd700;
            color: #333;
            font-size: 0.4em;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: bold;
            vertical-align: middle;
            margin-left: 10px;
        }
        p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .success {
            background: #10b981;
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            display: inline-block;
        }
        .info {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 15px;
            text-align: left;
            margin: 20px 0;
            border-radius: 5px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🖥️ MI PC EN LÍNEA <span>PRO</span></h1>
        <p>Página de prueba - GitHub Pages funcionando ✅</p>
        
        <div class="info">
            <strong>📌 Información:</strong><br>
            • Repositorio: github<br>
            • URL actual: scriptspr.github.io/github/<br>
            • Estado: 🟢 Activo
        </div>

        <div class="success">
            ¡GitHub Pages está funcionando correctamente!
        </div>

        <p style="margin-top: 30px; font-size: 1em;">
            Próximamente: Portales personalizados para clientes
        </p>

        <a href="https://scriptspr.github.io/github/" class="btn" target="_blank">
            Ver mi portal de ejemplo
        </a>
    </div>
</body>
</html>
