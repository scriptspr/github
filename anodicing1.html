<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anodizing Pro System v13.8 - Control Total Industrial</title>
    <style>
        :root { 
            --dark: #0d1117; --panel: #161b22; --accent: #58a6ff; 
            --gold: #d4af37; --danger: #f85149; --success: #238636; --warning: #d29922;
            --pause: #1f6feb; --excel: #1d6f42;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); 
            color: #c9d1d9; margin: 0; padding: 20px;
            overflow-y: auto; 
        }

        .dashboard { 
            display: grid; grid-template-columns: 380px 1fr 400px; 
            gap: 20px; max-width: 1850px; margin: auto; align-items: start;
        }

        .panel { 
            background: var(--panel); border: 1px solid #30363d; padding: 18px; 
            border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
            margin-bottom: 20px; 
        }

        .sticky-monitor {
            position: sticky;
            top: 20px;
            z-index: 100;
            border: 2px solid var(--accent);
        }

        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-top: 0; font-size: 0.95em; color: white; text-transform: uppercase; letter-spacing: 1px; }

        .input-field { 
            width: 100%; padding: 8px; background:#0d1117; color:white; border:1px solid #333; 
            border-radius: 6px; box-sizing: border-box; font-size: 0.9em; margin-bottom: 10px;
        }
        label { display: block; font-size: 0.7em; color: #8b949e; margin-bottom: 3px; text-transform: uppercase; }

        .data-table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-bottom: 15px; }
        .data-table td { padding: 6px; border-bottom: 1px solid #30363d; }
        .val-highlight { color: var(--accent); font-weight: bold; text-align: right; }

        .timer-display { 
            font-size: 110px; font-family: 'Courier New', monospace; text-align: center;
            color: var(--gold); margin: 5px 0; font-weight: bold; 
        }
        .timer-controls-manual { display: flex; gap: 5px; margin-bottom: 15px; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .proc-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--success); color: white; grid-column: span 2; font-size: 1.1em; }
        .btn-pause { background: var(--pause); color: white; }
        .btn-adj { background: #21262d; color: white; border: 1px solid #30363d; flex: 1; }
        .btn-proc { background: #30363d; color: #c9d1d9; font-size: 0.7em; border: 1px solid #444; }
        .btn-proc:hover { background: var(--accent); color: white; }
        .btn-qc { background: var(--gold); color: #000; width: 100%; }
        .btn-danger { background: var(--danger); color: white; grid-column: span 2; }
        .btn-excel { background: var(--excel); color: white; width: 100%; margin-top: 10px; }

        .log-box { height: 600px; overflow-y: auto; background: #010409; padding: 15px; border-radius: 8px; font-family: 'Consolas', monospace; font-size: 0.85em; border: 1px solid #30363d; }
        
        .temp-converter { display: flex; gap: 10px; align-items: center; background: #0d1117; padding: 10px; border-radius: 8px; border: 1px dashed #444; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="col">
        <div class="panel">
            <h2>ID Operador</h2>
            <label>Nombre</label><input type="text" id="empName" class="input-field" placeholder="Juan Pérez">
            <label>ID Empleado</label><input type="text" id="empID" class="input-field" placeholder="EMP-100">
            <button class="btn-pause" style="width:100%" onclick="setOperator()">REGISTRAR OPERADOR</button>
        </div>

        <div class="panel">
            <h2>Identificación de Lote</h2>
            <label>N° Lote</label><input type="text" id="batchNum" class="input-field" placeholder="L-900">
            <label>Nombre de Pieza</label><input type="text" id="partName" class="input-field" placeholder="Eje CNC">
            <label>Micras Objetivo (μm)</label><input type="number" id="microns" class="input-field" value="15">
            <button class="btn-main" onclick="loadBatch()">CARGAR POR MICRAS</button>
        </div>

        <div class="panel">
            <h2>Conversor de Temperatura</h2>
            <div class="temp-converter">
                <div style="flex:1"><label>°Celsius</label><input type="number" id="inputC" class="input-field" oninput="convCtoF()" placeholder="0"></div>
                <div style="color:var(--accent); font-weight:bold; margin-top:15px;">⇌</div>
                <div style="flex:1"><label>°Fahrenheit</label><input type="number" id="inputF" class="input-field" oninput="convFtoC()" placeholder="32"></div>
            </div>
            <h2 style="margin-top:20px; border-color:var(--warning)">Rangos de Proceso</h2>
            <table class="data-table">
                <tr><td>Desengrase</td><td class="val-highlight">60°C / 140°F</td></tr>
                <tr><td>Anodizado</td><td class="val-highlight">20°C / 68°F</td></tr>
                <tr><td>Sellado</td><td class="val-highlight">98°C / 208°F</td></tr>
                <tr><td>Coloración</td><td class="val-highlight">55°C / 131°F</td></tr>
            </table>
        </div>
    </div>

    <div class="col">
        <div class="panel sticky-monitor">
            <div id="statusLabel" style="font-weight:bold; letter-spacing:2px; color:var(--accent); text-align:center;">SISTEMA LISTO</div>
            <div id="timer" class="timer-display">00:00</div>
            
            <label style="text-align: center;">Pre-ajustes de Proceso</label>
            <div class="proc-grid">
                <button class="btn-proc" onclick="quickSet(8, 'LIMPIEZA')">LIMPIEZA (8m)</button>
                <button class="btn-proc" onclick="quickSet(2, 'DECAPADO')">DECAPADO (2m)</button>
                <button class="btn-proc" onclick="quickSet(45, 'ANODIZADO')">ANODIZADO (45m)</button>
                <button class="btn-proc" onclick="quickSet(15, 'COLOR')">COLOR (15m)</button>
                <button class="btn-proc" onclick="quickSet(20, 'SELLADO')">SELLADO (20m)</button>
                <button class="btn-proc" onclick="quickSet(3, 'ENJUAGUE')">ENJUAGUE (3m)</button>
            </div>

            <div class="timer-controls-manual">
                <button class="btn-adj" onclick="modifyTime(300)">+5m</button>
                <button class="btn-adj" onclick="modifyTime(60)">+1m</button>
                <input type="number" id="manualMin" class="input-field" placeholder="Min" style="margin:0; width:60px; text-align:center;">
                <button class="btn-adj" onclick="setManualTime()">Set</button>
                <button class="btn-adj" onclick="modifyTime(-60)">-1m</button>
                <button class="btn-adj" onclick="modifyTime(-300)">-5m</button>
            </div>

            <div class="btn-grid">
                <button class="btn-main" onclick="startTimer()">INICIAR PROCESO</button>
                <button class="btn-pause" onclick="pauseTimer()">PAUSAR</button>
                <button class="btn-danger" onclick="resetSystem()">RESET / EMERGENCIA</button>
            </div>
        </div>

        <div class="panel">
            <h2>Laboratorio (QC)</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>pH Baño</label><input type="text" id="ph" class="input-field" value="5.35"></div>
                <div><label>Espesor (μm)</label><input type="text" id="thick" class="input-field" value="16.4"></div>
                <div><label>Dureza (HV)</label><input type="text" id="hard" class="input-field" value="398"></div>
                <div><label>Sellado (mg/dm²)</label><input type="text" id="seal" class="input-field" value="2.1"></div>
            </div>
            <button class="btn-qc" onclick="logQC()">REGISTRAR VALORES QC</button>
        </div>
    </div>

    <div class="col">
        <div class="panel">
            <h2>Registro de Auditoría</h2>
            <div id="log" class="log-box">> Listo...</div>
            <button class="btn-adj" style="width:100%; margin-top:10px;" onclick="exportTXT()">EXPORTAR TXT</button>
            <button class="btn-excel" onclick="exportCSV()">EXPORTAR EXCEL (.CSV)</button>
        </div>
        
        <div class="panel">
            <h2>Cálculo Eléctrico</h2>
            <div style="display:flex; gap:10px;">
                <input type="number" id="currDens" class="input-field" value="1.5" step="0.1">
                <input type="number" id="surface" class="input-field" value="10">
            </div>
            <div id="ampResult" style="text-align:center; color:var(--gold); font-weight:bold;">15.0 A RECOMENDADOS</div>
            <button class="btn-adj" style="width:100%; margin-top:5px;" onclick="calcAmps()">RECALCULAR</button>
        </div>
    </div>
</div>

<script>
    let timeLeft = 0;
    let timerInterval = null;
    let currentOp = "No Identificado";
    let history = [];

    // --- FUNCIONES DE TEMPERATURA ---
    function convCtoF() {
        let c = document.getElementById('inputC').value;
        if(c !== "") { document.getElementById('inputF').value = ((c * 9/5) + 32).toFixed(1); }
    }
    function convFtoC() {
        let f = document.getElementById('inputF').value;
        if(f !== "") { document.getElementById('inputC').value = ((f - 32) * 5/9).toFixed(1); }
    }

    function setOperator() {
        currentOp = `${document.getElementById('empName').value || "Anon"} (${document.getElementById('empID').value || "S/ID"})`;
        addLog(`SESIÓN: Operador ${currentOp} activo.`);
    }

    function quickSet(m, label) {
        timeLeft = m * 60;
        updateDisplay();
        document.getElementById('statusLabel').innerText = label;
        addLog(`PRESET: ${label} (${m} min) seleccionado.`);
    }

    function loadBatch() {
        const m = document.getElementById('microns').value;
        timeLeft = m * 120;
        updateDisplay();
        addLog(`CARGA: Lote p/ ${m}μm.`);
    }

    function setManualTime() {
        const mins = document.getElementById('manualMin').value;
        if(mins > 0) { timeLeft = mins * 60; updateDisplay(); addLog(`MANUAL: ${mins} min.`); }
    }

    function modifyTime(secs) { timeLeft += secs; if(timeLeft < 0) timeLeft = 0; updateDisplay(); }

    function updateDisplay() {
        const m = Math.floor(Math.abs(timeLeft) / 60).toString().padStart(2, '0');
        const s = (Math.abs(timeLeft) % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }

    function startTimer() {
        if (timerInterval || timeLeft <= 0) return;
        document.getElementById('statusLabel').innerText = "EN PROCESO...";
        timerInterval = setInterval(() => {
            timeLeft--; updateDisplay();
            if (timeLeft === 0) { 
                clearInterval(timerInterval); timerInterval = null;
                playSound(); addLog("FINALIZADO.");
                document.getElementById('statusLabel').innerText = "TERMINADO";
            }
        }, 1000);
        addLog(`INICIO: Proceso activado.`);
    }

    function logQC() {
        addLog(`QC: pH ${document.getElementById('ph').value} | Esp: ${document.getElementById('thick').value}μm | Dur: ${document.getElementById('hard').value}HV`);
    }

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        const date = new Date().toLocaleDateString();
        document.getElementById('log').innerHTML = `<div>[${time}] ${msg}</div>` + document.getElementById('log').innerHTML;
        history.push({ fecha: date, hora: time, evento: msg, responsable: currentOp });
    }

    function calcAmps() {
        const res = (document.getElementById('currDens').value * document.getElementById('surface').value).toFixed(1);
        document.getElementById('ampResult').innerText = `${res} A RECOMENDADOS`;
    }

    function playSound() {
        const ctx = new AudioContext();
        const o = ctx.createOscillator();
        o.type = "square"; o.connect(ctx.destination);
        o.start(); setTimeout(() => o.stop(), 2000);
    }

    function exportTXT() {
        const content = history.map(h => `[${h.hora}] ${h.evento} - Resp: ${h.responsable}`).join("\n");
        const blob = new Blob([content], {type: "text/plain"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Reporte_${new Date().toLocaleDateString()}.txt`;
        a.click();
    }

    function exportCSV() {
        let csv = "\uFEFFFecha,Hora,Evento,Responsable\n";
        history.forEach(h => { csv += `"${h.fecha}","${h.hora}","${h.evento}","${h.responsable}"\n`; });
        const blob = new Blob([csv], {type: "text/csv;charset=utf-8;"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Produccion_${new Date().toLocaleDateString()}.csv`;
        a.click();
    }

    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; addLog("PAUSA."); }
    function resetSystem() { if(confirm("¿Reiniciar?")) location.reload(); }
</script>
</body>
</html>
